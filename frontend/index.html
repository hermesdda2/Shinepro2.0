<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#00C6FF" />
  <title>Shine Pro | Mobile Detailing – Orange County, CA</title>
  <meta name="description"
    content="Premium mobile car wash & detailing service. We come to your home or office in Orange County, California. Book online in minutes." />
  <meta property="og:title" content="Shine Pro | Mobile Detailing" />
  <meta property="og:description"
    content="Premium mobile car wash in Orange County, CA. Eco-friendly products, 100% hand wash." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.shinepro.net/" />
  <meta property="og:image" content="https://www.shinepro.net/ShineProNet2.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://www.shinepro.net/ShineProNet2.jpg" />
  <meta name="robots" content="index, follow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;600;700;800;900&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div id="root">
    <style>
      #sp-loader {
        position: fixed; inset: 0; background: #0A0D14;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; z-index: 99999;
      }
      .sp-logo { width: 120px; height: auto; margin-bottom: 1.5rem; animation: sp-glow 2s ease-in-out infinite; }
      @keyframes sp-glow {
        0%,100% { filter: drop-shadow(0 0 8px #FFD400); }
        50%      { filter: drop-shadow(0 0 24px #FFD400); }
      }
      .sp-title {
        font-family: Outfit, sans-serif; font-size: 2.2rem; font-weight: 900;
        color: #FFD400; letter-spacing: 0.08em; text-transform: uppercase; line-height: 1;
      }
      .sp-sub {
        color: #fff; font-size: 0.75rem; letter-spacing: 0.3em;
        margin-top: 0.5rem; font-weight: 600; opacity: 0.8; text-transform: uppercase;
      }
      .sp-bar-wrap {
        width: 220px; height: 6px; background: rgba(255,255,255,0.05);
        border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,212,0,0.1); margin-top: 3rem;
      }
      .sp-bar {
        height: 100%; width: 0%; border-radius: 10px;
        background: linear-gradient(90deg, #c9a800, #FFD400);
        box-shadow: 0 0 15px #FFD400;
        animation: sp-progress 0.5s ease-out forwards;
      }
      @keyframes sp-progress { to { width: 85%; } }
      .sp-label {
        display: flex; justify-content: space-between;
        margin-top: 1rem; font-size: 0.7rem; color: #8B9AB3;
        font-weight: 800; letter-spacing: 0.2em;
      }
      .sp-pct { color: #FFD400; }
    </style>
    <div id="sp-loader">
      <img src="/logo.png" alt="Shine Pro" class="sp-logo" />
      <div class="sp-title">SHINE PRO</div>
      <div class="sp-sub">MOBILE AUTO SPA</div>
      <div style="width:220px">
        <div class="sp-bar-wrap"><div class="sp-bar"></div></div>
        <div class="sp-label"><span>LOADING...</span><span class="sp-pct">85%</span></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
